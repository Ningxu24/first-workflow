name: Python Build & Deploy Workflow

on:
  workflow_dispatch:   # Run manually
  push:
    branches:
      - main

jobs:
  # Job 1: Build and test Python environment
  build_test:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out repository code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"  # Always uses the latest Python 3 version

      # Step 3: Install dependencies and run tests
      - name: Install dependencies & test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found"
          python -m unittest discover || echo "No tests found"

  # Job 2: Deploy to staging
  deploy_staging:
    runs-on: ubuntu-latest
    needs: build_test      # Waits for build_test to finish
    environment: staging   # Deploys to the staging environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Simulate deployment to staging
        run: echo "Deploying Python app to staging environment..."

  # Job 3: Deploy to production
  deploy_production:
    runs-on: ubuntu-latest
    needs: deploy_staging   # Waits for staging deployment
    environment: production # Deploys to the production environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Simulate deployment to production
        run: echo "Deploying Python app to production environment..."
