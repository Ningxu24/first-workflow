name: My First Workflow

on:
  # 1. 手动触发
  workflow_dispatch:

  # 2. 推送触发
  push:
    branches:
      - main

  # 3. 定时触发
  schedule:
    - cron: '15 6 * * 1-5'

  # 4. 拉取请求触发
  pull_request:
    branches:
      - main

# Jobs defined in this workflow
jobs:
  # Job 1: 第一个并行任务
  build-and-test-1:
    runs-on: ubuntu-latest
    env:
      DEBUG: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Print a message for main branch
        if: github.ref == 'refs/heads/main'
        run: echo "This is the main branch."

      - name: Print a message for non-main branches
        if: github.ref != 'refs/heads/main'
        run: echo "This is not the main branch."

      - name: Run Python tests
        run: |
          python <<EOF
          import unittest

          class SimpleTest(unittest.TestCase):
              def test_addition(self):
                  self.assertEqual(1 + 1, 2)

              def test_truth(self):
                  self.assertTrue(True)

          if __name__ == "__main__":
              unittest.main()
          EOF

      - name: Debug message
        if: env.DEBUG == 'true'
        run: echo "Debugging is enabled."

  # Job 2: 第二个并行任务
  build-and-test-2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run Python tests
        run: |
          python <<EOF
          print("Running tests in build-and-test-2 job")
          assert 2 * 2 == 4
          EOF

  # Job 3: 串行任务 (依赖前两个任务)
  post-build-actions:
    needs: [build-and-test-1, build-and-test-2]
    runs-on: ubuntu-latest

    steps:
      # 步骤 1: 创建一个简单的文本文件
      - name: Create a text file
        run: |
          echo "Build completed successfully on $(date)" > build-summary.txt
          echo "This is an artifact generated by the workflow." >> build-summary.txt

      # 步骤 2: 上传文件作为 Artifact
      - name: Upload build summary
        uses: actions/upload-artifact@v3
        with:
          name: build-summary
          path: build-summary.txt
