# Name of the workflow (appears in GitHub Actions UI)
name: My First Workflow

# Triggers for the workflow
on:
  # 1. 手动触发
  workflow_dispatch:

  # 2. 推送触发 (保留你原来的配置)
  push:
    branches:
      - main
  schedule:
    - cron: '15 6 * * 1-5'
  pull_request:
    branches:
      - main
# Jobs defined in this workflow
jobs:
  # First build-and-test job
  build-and-test-1:
    # Specifies the runner environment
    runs-on: ubuntu-latest

    # Environment variables available to all steps in this job
    env:
      DEBUG: false

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up the Python runtime
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # Step 3: Run only if the branch is main
      - name: Print a message for main branch
        if: github.ref == 'refs/heads/main'
        run: echo "This is the main branch."

      # Step 4: Run only if the branch is not main
      - name: Print a message for non-main branches
        if: github.ref != 'refs/heads/main'
        run: echo "This is not the main branch."

      # Step 5: Run a self-contained Python test script
      - name: Run Python tests
        run: |
          python <<EOF
          import unittest

          class SimpleTest(unittest.TestCase):
              def test_addition(self):
                  self.assertEqual(1 + 1, 2)

              def test_truth(self):
                  self.assertTrue(True)

          if __name__ == "__main__":
              unittest.main()
          EOF

      # Step 6: Optional debug step controlled by an environment variable
      - name: Debug message
        if: env.DEBUG == 'true'
        run: echo "Debugging is enabled."

  # Second build-and-test job (runs in parallel with the first)
  build-and-test-2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # Simple inline Python logic for demonstration purposes
      - name: Run Python tests
        run: |
          python <<EOF
          print("Running tests in build-and-test-2 job")
          assert 2 * 2 == 4
          EOF


# Define jobs for the workflow
jobs:
  build:
    runs-on: ubuntu-latest   # The OS for the runner (GitHub-hosted Ubuntu machine)

    # Steps to run inside the job
    steps:
      # Step 1: Check out your repository code
      - name: Check out repository
        uses: actions/checkout@v3   # Uses the official GitHub action to clone your repo

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4   # Official action to install Python
        with:
           python-version: '3.x'

      # Step 3: Run a Python command
      - name: Print a message
        run: python -c "print('Hello, world!')"   # Executes Python directly on the runner
