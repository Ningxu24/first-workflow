name: My First Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '15 6 * * 1-5'
  pull_request:
    branches:
      - main

jobs:
  build-and-test-1:
    runs-on: ubuntu-latest
    env:
      DEBUG: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Print a message for main branch
        if: github.ref == 'refs/heads/main'
        run: echo "This is the main branch."

      - name: Print a message for non-main branches
        if: github.ref != 'refs/heads/main'
        run: echo "This is not the main branch."

      # 注意：这里的 Python 代码必须缩进
      - name: Run Python tests
        run: |
          import unittest

          class SimpleTest(unittest.TestCase):
              def test_addition(self):
                  self.assertEqual(1 + 1, 2)

              def test_truth(self):
                  self.assertTrue(True)

          if __name__ == "__main__":
              unittest.main()

      - name: Debug message
        if: env.DEBUG == 'true'
        run: echo "Debugging is enabled."

  build-and-test-2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run Python tests
        run: |
          python -c "print('Running tests in build-and-test-2 job'); assert 2 * 2 == 4"

  # 第三个任务：后续处理（串行任务）
  post-build-actions:
    needs: [build-and-test-1, build-and-test-2]
    runs-on: ubuntu-latest

    steps:
      - name: Create a text file
        run: |
          echo "Build completed successfully on $(date)" > build-summary.txt
          echo "This is an artifact generated by the workflow." >> build-summary.txt

      - name: Upload build summary
        uses: actions/upload-artifact@v3
        with:
          name: build-summary
          path: build-summary.txt
