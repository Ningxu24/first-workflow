name: My First Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '15 6 * * 1-5'
  pull_request:
    branches:
      - main

jobs:
  # Job 1: 并行任务 1
  build-and-test-1:
    runs-on: ubuntu-latest
    env:
      DEBUG: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Print a message for main branch
        if: github.ref == 'refs/heads/main'
        run: echo "This is the main branch."

      - name: Print a message for non-main branches
        if: github.ref != 'refs/heads/main'
        run: echo "This is not the main branch."

      # 修正点：使用标准的 python 命令，并确保缩进正确
      - name: Run Python tests
        run: python -c "
import unittest

class SimpleTest(unittest.TestCase):
    def test_always_passes(self):
        self.assertTrue(True)

if __name__ == '__main__':
    unittest.main()
"

  # Job 2: 并行任务 2
  build-and-test-2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run a simple script
        run: python -c "print('Hello from build 2')"

  # Job 3: 串行任务（依赖上面两个）
  post-build-actions:
    needs: [build-and-test-1, build-and-test-2]
    runs-on: ubuntu-latest
    steps:
      - name: Create a text file
        run: |
          echo "Build completed successfully on $(date)" > build-summary.txt
          echo "This is an artifact generated by the workflow." >> build-summary.txt

      - name: Upload build summary
        uses: actions/upload-artifact@v3
        with:
          name: build-summary
          path: build-summary.txt
