name: My First Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '15 6 * * 1-5'
  pull_request:
    branches:
      - main

# 下面是唯一的 Jobs 定义
jobs:
  # Job 1: 复杂的测试任务
  build-and-test-1:
    runs-on: ubuntu-latest
    env:
      DEBUG: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"
      - name: Print a message for main branch
        if: github.ref == 'refs/heads/main'
        run: echo "This is the main branch."
      - name: Print a message for non-main branches
        if: github.ref != 'refs/heads/main'
        run: echo "This is not the main branch."
      - name: Run Python tests
        run: |
          python <<EOF
          import unittest
          class SimpleTest(unittest.TestCase):
              def test_addition(self):
                  self.assertEqual(1 + 1, 2)
              def test_truth(self):
                  self.assertTrue(True)
          if __name__ == "__main__":
              unittest.main()
          EOF
      - name: Debug message
        if: env.DEBUG == 'true'
        run: echo "Debugging is enabled."

  # Job 2: 并行运行的第二个任务
  build-and-test-2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"
      - name: Run Python tests
        run: |
          python <<EOF
          print("Running tests in build-and-test-2 job")
          assert 2 * 2 == 4
          EOF
